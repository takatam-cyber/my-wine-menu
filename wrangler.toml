#:schema node_modules/wrangler/config-schema.json
name = "my-wine-menu"
compatibility_date = "2024-05-02"
compatibility_flags = [ "nodejs_compat" ]

# 1. AI機能の再接続
[ai]
binding = "AI"

# 2. データベース(KV)の再接続
[[kv_namespaces]]
binding = "WINE_KV"
id = "WINE_KV_STORAGE" # 以前の画面で確認した名前です

# 3. 画像保存(R2)の再接続
[[r2_buckets]]
binding = "WINE_IMAGES"
bucket_name = "wine-pro-storage" # 最後に作った新しいバケット名
